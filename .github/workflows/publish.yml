name: Publish to npm

# Publishes @blockrealm/stacks-sdk to npm with provenance whenever a version
# tag (v*) is pushed or a GitHub Release is published. Provenance links the
# published package to this repository + commit (verifiable on npmjs.com).

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
